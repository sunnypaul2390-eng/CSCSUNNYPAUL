<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
</head>
<body style="text-align:center; margin-top:100px;">

<h2>Admin Login</h2>

<input type="text" id="user" placeholder="CSCSUNNY"><br><br>
<input type="password" id="pass" placeholder="12345"><br><br>

<button onclick="login()">Click Login</button>

<p id="error" style="color:red;"></p>

<script>
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "CSCSUNNY" && p === "12345") {
        window.location.href = "dashboard.html";
    } else {
        document.getElementById("error").innerText = "Wrong Login";
    }
}
</script>

</body>
</html>
